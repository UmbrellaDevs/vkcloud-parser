  <div class="app">
    <header class="header">
      <div class="logo">
        <span class="logo-icon"><i class="fas fa-cloud"></i></span>
        <h1>BOBIK CLOUD — VK Cloud</h1>
      </div>
      <div class="header-actions">
        <button class="btn btn-small btn-secondary" id="btnVMs">
          <span class="btn-icon"><i class="fas fa-server"></i></span>
          Машины
        </button>
        <div class="header-status" id="status">
          <span class="status-dot"></span>
          <span id="statusText">Парсер остановлен</span>
        </div>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <!-- Декоративные SVG для сайдбара -->
        <svg class="sidebar-bg-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800">
          <defs>
            <linearGradient id="sidebarGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:rgba(59,130,246,0.08);stop-opacity:1" />
              <stop offset="100%" style="stop-color:rgba(59,130,246,0.03);stop-opacity:1" />
            </linearGradient>
          </defs>
          <circle cx="50" cy="100" r="80" fill="url(#sidebarGrad1)" opacity="0.4"/>
          <circle cx="300" cy="500" r="60" fill="url(#sidebarGrad1)" opacity="0.3"/>
          <path d="M 0,200 Q 100,150 200,200 T 400,200" stroke="url(#sidebarGrad1)" stroke-width="1.5" fill="none" opacity="0.3"/>
        </svg>
        <section class="panel panel-config">
          <h2 class="panel-title">
            <span class="panel-icon"><i class="fas fa-cog"></i></span>
            Конфигурация
          </h2>
          <div class="config-grid">
            <div class="field field-full">
              <label>Целевые подсети (CIDR)</label>
              <input type="text" id="target_cidrs" placeholder="95.163, 95.163.248.0/22">
            </div>
            <div class="config-row">
              <div class="field">
                <label>Профиль поиска</label>
                <select id="profile">
                  <option value="fast">Быстрый</option>
                  <option value="balanced" selected>Сбалансированный</option>
                  <option value="safe">Безопасный</option>
                  <option value="no_pause">Без пауз</option>
                  <option value="test">Тестовый</option>
                </select>
              </div>
            </div>
            <div class="field field-full">
              <label>Telegram Bot Token</label>
              <div class="password-input-wrapper">
                <input type="password" id="telegram_bot_token" placeholder="опционально">
                <button class="btn-toggle-password" type="button" data-target="telegram_bot_token">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>
            <div class="field field-full">
              <label>Telegram Chat ID</label>
              <input type="text" id="telegram_chat_id" placeholder="опционально">
            </div>
          </div>
          <div class="config-actions">
            <button class="btn btn-secondary" id="btnLoad">
              <i class="fas fa-download"></i> Загрузить
            </button>
            <button class="btn btn-primary" id="btnSave">
              <i class="fas fa-save"></i> Сохранить
            </button>
          </div>
        </section>


        <section class="panel panel-accounts">
          <h2 class="panel-title">
            <span class="panel-icon"><i class="fas fa-users"></i></span>
            Аккаунты
          </h2>
          <div class="accounts-toolbar">
            <button class="btn btn-small btn-secondary" id="btnRefreshTokens" title="Обновить Keystone токены всех аккаунтов">
              <i class="fas fa-sync-alt"></i> Токены
            </button>
            <button class="btn btn-small btn-accent" id="btnAddAccount">
              <i class="fas fa-plus"></i> Добавить
            </button>
          </div>
          <div id="accountsList"></div>

          <!-- Добавление аккаунта: Email + Password + Project ID -->
          <div class="account-form" id="accountForm" style="display:none">
            <div class="form-title"><i class="fas fa-edit"></i> Добавление аккаунта VK Cloud</div>
            <div class="field field-full">
              <label>Название</label>
              <input type="text" id="acc_name" placeholder="Аккаунт 1">
            </div>
            <div class="field field-full">
              <label><i class="fas fa-envelope"></i> Email (username)</label>
              <input type="text" id="acc_username" placeholder="user@example.com" autocomplete="off">
            </div>
            <div class="field field-full">
              <label><i class="fas fa-key"></i> Пароль</label>
              <div class="password-input-wrapper">
                <input type="password" id="acc_password" placeholder="пароль от VK Cloud" autocomplete="off">
                <button class="btn-toggle-password" type="button" data-target="acc_password">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>
            <div class="field field-full">
              <label><i class="fas fa-project-diagram"></i> Project ID</label>
              <input type="text" id="acc_project_id" placeholder="mcs1234567890" autocomplete="off">
            </div>
            <div class="field field-full">
              <label><i class="fas fa-globe"></i> SOCKS5 прокси</label>
              <input type="text" id="acc_proxy" placeholder="user:pass@host:port">
            </div>
            <div class="config-actions">
              <button class="btn btn-secondary" id="btnCancelAccount">Отмена</button>
              <button class="btn btn-accent" id="btnSaveAccount">
                <i class="fas fa-save"></i> Сохранить
              </button>
            </div>
          </div>
        </section>

        <section class="panel panel-controls">
          <h2 class="panel-title">
            <span class="panel-icon"><i class="fas fa-play-circle"></i></span>
            Парсер
          </h2>
          <div class="controls-row">
            <button class="btn btn-start" id="btnStart">
              <span class="btn-icon"><i class="fas fa-play"></i></span>
              Запустить
            </button>
            <button class="btn btn-stop" id="btnStop" disabled>
              <span class="btn-icon"><i class="fas fa-stop"></i></span>
              Остановить
            </button>
          </div>
        </section>

        <section class="panel panel-traces">
          <h2 class="panel-title">
            <span class="panel-icon"><i class="fas fa-trash-alt"></i></span>
            Очистка следов
          </h2>
          <button class="btn btn-danger" id="btnClear">
            <span class="btn-icon"><i class="fas fa-broom"></i></span>
            Очистить
          </button>
        </section>
      </aside>

        <img src="assets/cloud-modern.svg" alt="" class="log-cloud-img log-cloud-2" aria-hidden="true">
        <div class="log-header">
          <h2 class="log-title">
            <span class="log-icon"><i class="fas fa-terminal"></i></span>
            Логи
          </h2>
          <button class="btn btn-small btn-secondary" id="btnClearLogs">
            <i class="fas fa-eraser"></i> Очистить
          </button>
        </div>
        <div class="log-tabs" id="logTabs">
          <button class="log-tab active" data-tab="all">Все</button>
        </div>
        <div class="log-content" id="logContent"></div>
      </main>
